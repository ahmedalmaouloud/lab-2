version: 0.0
os: linux

files:
  - source: output/lab2-webapp.war
    destination: /usr/share/tomcat10/webapps

hooks:
  ApplicationStop:
    - location: stop_server.sh
      timeout: 300
      runas: root

  BeforeInstall:
    - location: install_dependencies.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: start_server.sh
      timeout: 300
      runas: root
